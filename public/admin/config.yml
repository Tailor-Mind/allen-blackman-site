        fields:
          - { label: "Page Heading", name: "heading", widget: "string", hint: "Large heading on the 404 page. Default: 'Page Not Found'." }
          - { label: "Message", name: "message", widget: "text", hint: "Explanation shown under the heading." }
          - { label: "Home Button Label", name: "homeButtonLabel", widget: "string", hint: "Text on the 'Go home' button." }
          - { label: "Navigation Suggestion Text", name: "navSuggestionText", widget: "string", hint: "Text above the list of alternative pages. Default: 'Or visit:'." }

      - label: "🦶 Footer"
        name: "footer"
        file: "src/data/settings/footer.json"
        description: "Text shown at the bottom of every page. → View live: visible at the bottom of any page (e.g., https://allenblackman.netlify.app/)"
        fields:
          - { label: "Show Social Links in Footer", name: "showSocialLinks", widget: "boolean", default: true, hint: "Show Google Scholar, ORCID, etc. links in the footer." }
          - { label: "Copyright Text (optional)", name: "copyrightText", widget: "string", required: false, hint: "Override the default '© YEAR Name. Institution.' Leave blank to use the default." }
          - { label: "Additional Footer Text (optional)", name: "additionalText", widget: "text", required: false, hint: "Optional extra line below copyright (e.g., a disclaimer or acknowledgment)." }

  # ============================================================
  # SITE SETTINGS — Core identity, rarely changes
  # ============================================================
  - name: "settings"
    label: "⚙️ Site Settings"
    description: "Core site identity: your name, site-wide metadata, colors, social profiles. These apply to every page — changing them affects the whole site."
    editor:
      preview: false
    files:

      - label: "🆔 Identity & SEO Basics"
        name: "general"
        file: "src/data/settings/general.json"
        description: "Your identity and core SEO defaults used across the site."
        fields:
          - label: "Site Title"
            name: "siteTitle"
            widget: "string"
            hint: "🎯 SEO CRITICAL: Your name or site name. Appears in browser tabs, Google search results, and the header. Affects EVERY page's <title> tag."
          - label: "Site Description (default meta description)"
            name: "siteDescription"
            widget: "text"
            hint: "🎯 SEO: One sentence describing who you are and what you do. Used as the default meta description. 140–160 characters is ideal."
          - { label: "Your Full Name", name: "authorName", widget: "string", hint: "Your name as shown in headers, citations, and structured data." }
          - { label: "Your Title / Position", name: "authorTitle", widget: "string", hint: "E.g., 'Lead Economist'. Appears next to your name and in structured data." }
          - { label: "Your Affiliation", name: "authorAffiliation", widget: "string", hint: "🎯 SEO: Your institution. Used in structured data — Google reads this to understand who you work for." }
          - { label: "Your Email", name: "authorEmail", widget: "string", hint: "Public contact email." }
          - label: "Your Photo"
            name: "authorPhoto"
            widget: "image"
            required: false
            hint: "🎯 SEO: Professional headshot. Shown on homepage and About page. Also used as a fallback social media preview image. ⚠️ IMPORTANT: For the best look, upload a SQUARE image (1:1 ratio) with the face centered — at least 400×400px. If you upload a rectangular/portrait photo, use the 'Photo Focus' dropdown below to adjust which part of the image is shown."
          - label: "Photo Focus (which part of the image to show when cropped)"
            name: "photoFocus"
            widget: "select"
            default: "upper"
            options:
              - { label: "Upper portion (best for portraits — shows face)", value: "upper" }
              - { label: "Top", value: "top" }
              - { label: "Center", value: "center" }
              - { label: "Lower portion", value: "lower" }
              - { label: "Bottom", value: "bottom" }
            hint: "Your photo is cropped to a square for display. This setting chooses which part of the image stays visible. 'Upper portion' works for most portraits since faces are usually in the top half. Change this if your photo's face is getting cut off."
          - label: "Favicon (browser tab icon)"
            name: "favicon"
            widget: "image"
            required: false
            hint: "🎯 SEO: The tiny icon shown in browser tabs, bookmarks, and Google search results next to your URL. Recommended: a square 512×512 PNG or an SVG. A simple monogram (like 'AB') on your brand color works well. Leave blank to use the default Astro icon."
          - label: "Default Social Media Preview Image"
            name: "defaultOgImage"
            widget: "image"
            required: false
            hint: "🎯 SEO: Shown when someone shares any page of your site on Twitter, LinkedIn, Facebook, Slack, iMessage, etc. Use 1200×630px for best results. A banner with your photo and name works well. Leave blank to fall back to your profile photo."
          - { label: "Primary Color", name: "primaryColor", widget: "color", default: "#1a365d", hint: "Main color — headings, navigation, major accents." }
          - { label: "Accent Color", name: "accentColor", widget: "color", default: "#2b6cb0", hint: "Secondary color — links, buttons, highlights." }
          - { label: "Google Analytics ID (optional)", name: "googleAnalyticsId", widget: "string", required: false, hint: "Your GA Measurement ID (starts with 'G-'). Leave blank to disable." }

      - label: "🧭 Navigation & Section Visibility"
        name: "sections"
        file: "src/data/settings/sections.json"
        description: "Control which sections appear in the navigation and in what order."
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            hint: "Each entry is a top-level page. Toggle 'Enabled' to hide/show in the navigation."
            fields:
              - { label: "ID (do not change)", name: "id", widget: "string", hint: "Internal identifier — DON'T change this." }
              - { label: "Navigation Label", name: "label", widget: "string", hint: "How this appears in the menu." }
              - { label: "URL Path (do not change)", name: "path", widget: "string" }
              - { label: "Enabled (show in nav)", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide from navigation. The page URL still works." }
              - { label: "Display Order", name: "order", widget: "number", hint: "Lower = appears first. 1 = leftmost." }
          - { label: "Show CV Download Button", name: "showCvDownload", widget: "boolean", default: true }
          - { label: "CV File (PDF)", name: "cvFile", widget: "file", required: false, hint: "Upload as PDF. Update this whenever your CV changes." }

      - label: "🌐 Social & Academic Profiles"
        name: "social"
        file: "src/data/settings/social.json"
        description: "Links to your profiles on academic platforms. CRITICAL for SEO — helps Google confirm you're the real 'Allen Blackman'."
        fields:
          - { label: "Google Scholar URL", name: "googleScholar", widget: "string", required: false, hint: "🎯 SEO CRITICAL: Your Scholar profile URL. Establishes your academic identity." }
          - { label: "ORCID URL", name: "orcid", widget: "string", required: false, hint: "🎯 SEO CRITICAL: Your ORCID profile (e.g., 'https://orcid.org/0000-0002-XXXX-XXXX'). The academic world's canonical identity system." }
          - { label: "ResearchGate URL", name: "researchGate", widget: "string", required: false }
          - { label: "Academia.edu URL", name: "academiaEdu", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false, hint: "Broadens reach beyond academic audiences." }
          - { label: "Twitter / X URL", name: "twitter", widget: "string", required: false }
          - { label: "GitHub URL", name: "github", widget: "string", required: false }
